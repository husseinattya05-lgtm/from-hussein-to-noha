<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Interactive Story Test</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial;
  color: white;
  transition: background 2s ease;
}

#chat {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 15px;
  overflow-y: auto;
}

.msg {
  max-width: 75%;
  padding: 12px 14px;
  margin: 6px 0;
  border-radius: 14px;
  line-height: 1.4;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.4s;
  white-space: pre-wrap;
}

.left {
  background: #2a2a2a;
  align-self: flex-start;
}

.right {
  background: #3a3a3a;
  align-self: flex-end;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

.options {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
}

.option-btn {
  background: #2a2a2a;
  border: none;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.option-btn:hover {
  background: #444;
}

.typing {
  display: inline-block;
  padding: 10px;
  background: #2a2a2a;
  border-radius: 10px;
  margin: 5px 0;
}

/* FINAL PAGE */
.final-page {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #1e1e3f, #000000);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  opacity: 0;
  transition: 1.5s;
}

.final-text {
  font-size: 28px;
  text-align: center;
  opacity: 0;
  transition: 1s;
}

</style>
</head>

<body>

<div id="chat"></div>

<script>

const chat = document.getElementById("chat");

function scroll(){
  chat.scrollTop = chat.scrollHeight;
}

/* typing indicator */
function typingIndicator(){
  return new Promise(resolve=>{
    const t = document.createElement("div");
    t.className = "typing";
    t.innerText = "...";
    chat.appendChild(t);
    scroll();

    setTimeout(()=>{
      t.remove();
      resolve();
    }, 800);
  });
}

/* message typing */
function addMessage(text, side="left"){
  return new Promise(resolve=>{
    const msg = document.createElement("div");
    msg.className = `msg ${side}`;
    chat.appendChild(msg);

    let i = 0;

    function type(){
      if(i < text.length){
        msg.innerText += text[i];
        i++;
        scroll();
        setTimeout(type, 18);
      } else {
        msg.classList.add("show");
        resolve();
      }
    }

    type();
  });
}

/* options */
function addOptions(options){
  return new Promise(resolve=>{
    const container = document.createElement("div");
    container.className = "options";

    options.forEach(opt=>{
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerText = opt.text;

      btn.onclick = async ()=>{
        container.remove();
        await addMessage(opt.text, "right");
        resolve();
        opt.action();
      };

      container.appendChild(btn);
    });

    chat.appendChild(container);
    scroll();
  });
}

/* START */
async function start(){

  await addMessage("Hey…", "left");
  await addMessage("Quick test…", "left");

  await addOptions([
    { text: "Start", action: scene1 }
  ]);
}

/* STORY */
async function scene1(){

  await addMessage("Not in a heavy way… just quietly.", "left");
  await addMessage("Some moments feel simple… but they stay.", "left");
  await addMessage("Not because they are loud…", "left");
  await addMessage("but because they are consistent.", "left");

  await addOptions([
    { text: "Continue", action: scene2 }
  ]);
}

async function scene2(){

  await addMessage("When someone feels lonely…", "left");
  await addMessage("what do they need most?", "left");

  await addOptions([
    { text: "Someone to talk to", action: scene3 },
    { text: "Someone to run to", action: scene3 },
    { text: "Someone who understands", action: scene3 }
  ]);
}

async function scene3(){

  await addMessage("What matters more?", "left");

  await addOptions([
    { text: "Listening", action: scene4 },
    { text: "Being there", action: scene4 },
    { text: "Not giving up", action: scene4 }
  ]);
}

async function scene4(){

  await addMessage("What makes someone irreplaceable?", "left");

  await addOptions([
    { text: "They stay", action: analyze },
    { text: "They care", action: analyze },
    { text: "They never leave", action: analyze }
  ]);
}

/* ANALYSIS */
async function analyze(){

  await typingIndicator();

  await addMessage("Analyzing your answers...", "left");

  setTimeout(resultScene, 2000);
}

/* RESULT */
async function resultScene(){

  await addMessage("You didn’t describe someone you need…", "left");
  await addMessage("You described yourself.", "left");

  await addOptions([
    {
      text: "Tap to see something…",
      action: revealFinal
    }
  ]);
}

/* FINAL FULL SCREEN PAGE */
async function revealFinal(){

  // hide chat completely
  document.getElementById("chat").style.display = "none";

  // create final page
  const finalPage = document.createElement("div");
  finalPage.className = "final-page";
  document.body.appendChild(finalPage);

  setTimeout(()=>{
    finalPage.style.opacity = "1";
  },100);

  await new Promise(r=>setTimeout(r,1200));

  const text = document.createElement("div");
  text.className = "final-text";
  finalPage.appendChild(text);

  setTimeout(()=>{
    text.style.opacity = "1";
  },400);

  const finalText = "you've always been there for me \nyou give me peace";

  let i = 0;

  function type(){
    if(i <= finalText.length){
      text.textContent = finalText.substring(0, i);
      i++;
      setTimeout(type, 60);
    }
  }

  setTimeout(type, 800);

  setTimeout(()=>{
    text.style.textShadow = "0 0 25px rgba(180,180,255,0.8), 0 0 10px rgba(255,255,255,0.6)";
  }, 3000);
}

/* init */
start();

</script>

</body>
</html>
